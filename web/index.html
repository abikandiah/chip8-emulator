<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHIP-8 Emulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      gap: 16px;
    }

    h1 { font-size: 1.4rem; letter-spacing: 0.1em; }

    canvas {
      image-rendering: pixelated;
      border: 2px solid #444;
      width: 640px;
      height: 320px;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    label {
      background: #333;
      border: 1px solid #555;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: 4px;
    }
    label:hover { background: #444; }

    input[type="file"] { display: none; }

    #status {
      font-size: 0.85rem;
      color: #888;
    }

    .keymap {
      font-size: 0.75rem;
      color: #666;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <h1>CHIP-8</h1>
  <canvas id="screen" width="64" height="32"></canvas>

  <div class="controls">
    <label>
      Load ROM
      <input type="file" id="romInput" accept=".ch8,.rom,.bin">
    </label>
    <span id="status">No ROM loaded</span>
  </div>

  <div class="keymap">
    Keyboard: 1234 / QWER / ASDF / ZXCV → CHIP-8 keys 1-C / 4-D / 7-E / A-F
  </div>

  <script>
    // Filled in by Emscripten
    var Module = {};

    // CHIP-8 keymap: physical key → CHIP-8 key index
    const KEY_MAP = {
      '1': 0x1, '2': 0x2, '3': 0x3, '4': 0xC,
      'q': 0x4, 'w': 0x5, 'e': 0x6, 'r': 0xD,
      'a': 0x7, 's': 0x8, 'd': 0x9, 'f': 0xE,
      'z': 0xA, 'x': 0x0, 'c': 0xB, 'v': 0xF,
    };

    const canvas = document.getElementById('screen');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    // Called from C via EM_ASM when draw_flag is set
    function renderFrame() {
      const ptr = Module._wasm_get_display();
      // display is uint32_t[64*32]; read as 32-bit words from wasm heap
      const display = new Uint32Array(Module.HEAPU32.buffer, ptr, 64 * 32);

      const imageData = ctx.createImageData(64, 32);
      for (let i = 0; i < 64 * 32; i++) {
        const on = display[i] ? 255 : 0;
        imageData.data[i * 4 + 0] = on;
        imageData.data[i * 4 + 1] = on;
        imageData.data[i * 4 + 2] = on;
        imageData.data[i * 4 + 3] = 255;
      }
      ctx.putImageData(imageData, 0, 0);
    }

    // ROM file picker
    document.getElementById('romInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(ev) {
        const data = new Uint8Array(ev.target.result);
        const ptr = Module._malloc(data.length);
        if (!ptr) { status.textContent = 'Error: out of memory'; return; }
        Module.HEAPU8.set(data, ptr);
        const result = Module._wasm_load_rom(ptr, data.length);
        Module._free(ptr);

        if (result === 0) {
          status.textContent = `Running: ${file.name}`;
        } else {
          status.textContent = 'Error: ROM too large';
        }
      };
      reader.readAsArrayBuffer(file);
    });

    // Keyboard input
    document.addEventListener('keydown', function(e) {
      const key = KEY_MAP[e.key.toLowerCase()];
      if (key !== undefined) Module._wasm_set_key(key, 1);
    });

    document.addEventListener('keyup', function(e) {
      const key = KEY_MAP[e.key.toLowerCase()];
      if (key !== undefined) Module._wasm_set_key(key, 0);
    });
  </script>

  <!-- Load the Emscripten-generated JS (build with: make wasm) -->
  <script src="chip8.js"></script>
</body>
</html>
