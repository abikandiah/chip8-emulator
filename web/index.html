<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CHIP-8 Emulator</title>
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			background: #1a1a1a;
			color: #e0e0e0;
			font-family: monospace;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 100dvh;
			padding: 24px;
			gap: 16px;
		}

		h1 {
			font-size: 1.4rem;
			letter-spacing: 0.1em;
		}

		canvas {
			image-rendering: pixelated;
			border: 2px solid #444;
			width: min(640px, calc(100vw - 48px));
			aspect-ratio: 2 / 1;
		}

		.controls {
			display: flex;
			gap: 12px;
			align-items: center;
			flex-wrap: wrap;
			justify-content: center;
		}

		label,
		select,
		button,
		.divider {
			background: #333;
			border: 1px solid #555;
			padding: 6px 14px;
			cursor: pointer;
			border-radius: 4px;
			color: #e0e0e0;
			font-family: monospace;
			font-size: 1rem;
		}

		label:hover,
		button:hover {
			background: #444;
		}

		select:hover {
			background: #444;
		}

		button:disabled {
			opacity: 0.4;
			cursor: default;
		}

		select option {
			background: #1a1a1a;
		}

		.divider {
			cursor: default;
			color: #555;
			border-color: transparent;
			background: transparent;
			padding: 6px 2px;
		}

		input[type="file"] {
			display: none;
		}

		#status {
			font-size: 0.85rem;
			color: #888;
		}

		.keymap {
			font-size: 0.75rem;
			color: #666;
			text-align: center;
			line-height: 1.8;
		}

		.keymap a {
			color: #888;
			text-decoration: underline;
			text-underline-offset: 3px;
		}

		.keymap a:hover {
			color: #bbb;
		}
	</style>
</head>

<body>
	<h1>CHIP-8</h1>
	<canvas id="screen" width="64" height="32"></canvas>

	<div class="controls">
		<select id="romSelect">
			<option value="">— Built-in ROMs —</option>
			<option value="roms/snake.ch8">Snake</option>
			<option value="roms/RPS.ch8">Rock Paper Scissors</option>
			<option value="roms/br8kout.ch8">Br8kout</option>
		</select>
		<span class="divider">or</span>
		<label>
			Upload ROM
			<input type="file" id="romInput" accept=".ch8,.rom,.bin">
		</label>
		<span class="divider">|</span>
		<button id="resetBtn" disabled>Reset</button>
		<button id="pauseBtn" disabled>Pause</button>
	</div>
	<span id="status">No ROM loaded</span>

	<div class="keymap">
		Keyboard: 1234 / QWER / ASDF / ZXCV → CHIP-8 keys 1-C / 4-D / 7-E / A-F<br>
		More ROMs: <a href="https://johnearnest.github.io/chip8Archive/" target="_blank" rel="noopener">chip8Archive</a>
	</div>

	<script>
		// Filled in by Emscripten
		var Module = {
			onRuntimeInitialized: function () {
				Module._main();
				// Auto-load the first ROM once the WASM runtime is ready
				loadRomFromPath('roms/snake.ch8', 'Snake');
				document.getElementById('romSelect').value = 'roms/snake.ch8';
			}
		};

		// CHIP-8 keymap: physical key → CHIP-8 key index
		const KEY_MAP = {
			'1': 0x1, '2': 0x2, '3': 0x3, '4': 0xC,
			'q': 0x4, 'w': 0x5, 'e': 0x6, 'r': 0xD,
			'a': 0x7, 's': 0x8, 'd': 0x9, 'f': 0xE,
			'z': 0xA, 'x': 0x0, 'c': 0xB, 'v': 0xF,
		};

		const canvas = document.getElementById('screen');
		const ctx = canvas.getContext('2d');
		const status = document.getElementById('status');
		const resetBtn = document.getElementById('resetBtn');
		const pauseBtn = document.getElementById('pauseBtn');

		let paused = false;

		// Called from C via EM_ASM when draw_flag is set
		function renderFrame() {
			const ptr = Module._wasm_get_display();
			// display is uint32_t[64*32]; read as 32-bit words from wasm heap
			const display = new Uint32Array(Module.HEAPU32.buffer, ptr, 64 * 32);

			const imageData = ctx.createImageData(64, 32);
			for (let i = 0; i < 64 * 32; i++) {
				const on = display[i] ? 255 : 0;
				imageData.data[i * 4 + 0] = on;
				imageData.data[i * 4 + 1] = on;
				imageData.data[i * 4 + 2] = on;
				imageData.data[i * 4 + 3] = 255;
			}
			ctx.putImageData(imageData, 0, 0);
		}

		function loadRomBytes(data, name) {
			// Write directly into the C-side static staging buffer to avoid
			// Module._malloc + HEAPU8 stale-buffer issues with ALLOW_MEMORY_GROWTH.
			const ptr = Module._wasm_get_rom_buffer();
			Module.HEAPU8.set(data, ptr);
			const result = Module._wasm_load_rom_from_buffer(data.length);
			if (result === 0) {
				status.textContent = `Running: ${name}`;
				// Resume if paused, and clear the paused state
				if (paused) {
					paused = false;
					Module._wasm_set_paused(0);
					pauseBtn.textContent = 'Pause';
				}
				renderFrame(); // clear leftover display from previous ROM
				resetBtn.disabled = false;
				pauseBtn.disabled = false;
			} else {
				status.textContent = 'Error: ROM too large';
			}
		}

		function loadRomFromPath(path, name) {
			fetch(path)
				.then(r => { if (!r.ok) throw new Error(r.status); return r.arrayBuffer(); })
				.then(buf => loadRomBytes(new Uint8Array(buf), name || path.split('/').pop()))
				.catch(() => { status.textContent = 'Error: failed to fetch ROM'; });
		}

		// Built-in ROM select
		document.getElementById('romSelect').addEventListener('change', function (e) {
			const path = e.target.value;
			if (!path) return;
			loadRomFromPath(path);
		});

		// ROM file picker
		document.getElementById('romInput').addEventListener('change', function (e) {
			const file = e.target.files[0];
			if (!file) return;
			const reader = new FileReader();
			reader.onload = function (ev) {
				loadRomBytes(new Uint8Array(ev.target.result), file.name);
				// Clear select so user can re-pick the same file later
				document.getElementById('romSelect').value = '';
			};
			reader.readAsArrayBuffer(file);
		});

		// Reset current ROM
		resetBtn.addEventListener('click', function () {
			if (Module._wasm_reset_rom() === 0) {
				if (paused) {
					paused = false;
					Module._wasm_set_paused(0);
					pauseBtn.textContent = 'Pause';
				}
				renderFrame();
				status.textContent = status.textContent.replace(/^Paused: /, 'Running: ');
			}
		});

		// Pause / Resume
		pauseBtn.addEventListener('click', function () {
			paused = !paused;
			Module._wasm_set_paused(paused ? 1 : 0);
			pauseBtn.textContent = paused ? 'Resume' : 'Pause';
			status.textContent = status.textContent
				.replace(/^Running: /, paused ? 'Paused: ' : 'Running: ')
				.replace(/^Paused: /, paused ? 'Paused: ' : 'Running: ');
		});

		// Keyboard input
		document.addEventListener('keydown', function (e) {
			const key = KEY_MAP[e.key.toLowerCase()];
			if (key !== undefined) Module._wasm_set_key(key, 1);
		});

		document.addEventListener('keyup', function (e) {
			const key = KEY_MAP[e.key.toLowerCase()];
			if (key !== undefined) Module._wasm_set_key(key, 0);
		});
	</script>

	<!-- Load the Emscripten-generated JS (build with: make wasm) -->
	<script src="chip8.js"></script>
</body>

</html>
